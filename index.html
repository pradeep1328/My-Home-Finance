<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Home Finance</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

    <h1>🏠 My Home Finance</h1>

    <div class="card">
        <label>💰 Monthly Income (₹)</label><br>
        <input type="number" id="income" placeholder="Enter Monthly Income">
    </div>

    <div class="card">
        <label>💸 Monthly Expense (₹)</label><br>
        <input type="number" id="expense" placeholder="Enter Monthly Expense">
    </div>

    <button onclick="calculate()">Calculate Balance</button>

    <div class="result">
        <h2>Remaining Balance</h2>
        <h1>₹ <span id="balance">0</span></h1>
    </div>

</div>

<script src="script.js"></script>

</body>
</html>
