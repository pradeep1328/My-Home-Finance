<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Home Finance</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

    <h1>🏠 My Home Finance</h1>
<div class="dashboard">

    <div class="box">
        <h3>💰 Income</h3>
        <p id="incomeCard">₹0</p>
    </div>

    <div class="box">
        <h3>💸 Expenses</h3>
        <p id="expenseCard">₹0</p>
    </div>

    <div class="box">
        <h3>💵 Balance</h3>
        <p id="balanceCard">₹0</p>
    </div>

</div>
    <div class="card">
        <label>💰 Monthly Income (₹)</label>
        <input type="number" id="income" placeholder="Enter Monthly Income">
    </div>

    <div class="card">
        <label>🛒 Groceries (₹)</label>
        <input type="number" id="groceries" placeholder="Enter Groceries Expense">
    </div>

    <div class="card">
        <label>⛽ Petrol (₹)</label>
        <input type="number" id="petrol" placeholder="Enter Petrol Expense">
    </div>

    <div class="card">
        <label>🏦 EMI (₹)</label>
        <input type="number" id="emi" placeholder="Enter EMI">
    </div>

    <div class="card">
        <label>🛡️ Insurance (₹)</label>
        <input type="number" id="insurance" placeholder="Enter Insurance">
    </div>

    <div class="card">
        <label>🎓 School Fee (₹)</label>
        <input type="number" id="school" placeholder="Enter School Fee">
    </div>

    <div class="card">
        <label>📱 Mobile / Internet (₹)</label>
        <input type="number" id="mobile" placeholder="Enter Mobile & Internet">
    </div>

    <div class="card">
        <label>➕ Other Expenses (₹)</label>
        <input type="number" id="other" placeholder="Enter Other Expenses">
    </div>

    <div class="buttons">
    <button onclick="calculate()">Calculate</button>
    <button onclick="saveData()">Save</button>
    <button onclick="resetData()">Reset</button>
</div>

    <div class="result">
        <h2>Total Expenses</h2>
        <h1>₹ <span id="totalExpense">0</span></h1>

        <h2>Remaining Balance</h2>
        <h1>₹ <span id="balance">0</span></h1>
    </div>

</div>

<script src="script.js"></script>

</body>
</html>
